<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopes and Dreams | Turning Ambition into Action</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #0a0e1a;
            --neon-blue: #38bdf8;
            --neon-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px 0 30px 0; /* Balanced padding */
            background: var(--bg-black);
        }

        .logo-wrap {
            width: 100%;
            max-width: 650px; 
            line-height: 0;
        }

        .logo-wrap img {
            width: 100%;
            height: auto;
            mix-blend-mode: screen; 
            display: block;
        }

        nav {
            /* FIXED: Removed the negative margin so links sit below the image */
            margin-top: 10px; 
            z-index: 10;
            position: relative;
        }

        nav a {
            color: var(--neon-blue);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        nav a:hover {
            color: var(--neon-gold);
            opacity: 1;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* --- MAIN CONTENT --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }

        .glow-divider {
            width: 100%;
            height: 1px;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
            opacity: 0.2;
            margin-bottom: 60px;
            margin-top: 20px;
        }

        .hero-description {
            max-width: 750px;
            margin: 0 auto 80px;
        }

        .hero-description p {
            font-size: 1.2rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .hero-description strong {
            color: var(--neon-blue);
        }

        /* --- FEATURE GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 100px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(56, 189, 248, 0.05);
            transition: all 0.4s ease;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 40px -20px rgba(56, 189, 248, 0.4);
        }

        .card h3 {
            margin-top: 0;
            color: var(--neon-blue);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .card p {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 0;
        }
