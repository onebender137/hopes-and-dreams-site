<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intel Hub | Hopes and Dreams Syndicate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Exact same styles as above to ensure zero jumping */
        :root { --bg-main: #0a0f2b; --card-bg: #0d162d; --neon-blue: #38bdf8; --neon-gold: #fbbf24; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; }
        header { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 40px 0 20px 0; background-color: var(--bg-main); min-height: 280px; }
        .logo-wrap { width: 95%; max-width: 700px; height: 150px; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-wrap img { width: 100%; height: auto; max-height: 150px; object-fit: contain; display: block; filter: contrast(1.15) brightness(0.95) saturate(1.1); -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 45%, rgba(0,0,0,0) 95%); mask-image: radial-gradient(circle, rgba(0,0,0,1) 45%, rgba(0,0,0,0) 95%); }
        nav { margin-top: 40px; padding-bottom: 60px; z-index: 10; display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; width: 100%; }
        nav a { color: var(--neon-blue); text-decoration: none; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; transition: all 0.3s ease; opacity: 0.9; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); white-space: nowrap; }
        nav a:hover { color: var(--neon-gold); opacity: 1; transform: scale(1.1); }
        @media (max-width: 600px) { header { min-height: auto; padding-top: 20px; } nav { flex-direction: column; gap: 15px; margin-top: 20px; padding-bottom: 40px; } nav a { font-size: 1.1rem; } .logo-wrap { height: 100px; } .logo-wrap img { max-height: 100px; } }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; text-align: center; }
        .glow-divider { width: 100%; height: 1px; background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%); opacity: 0.2; margin: 60px 0; }
        .page-title { color: var(--neon-gold); font-size: 2.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .intel-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.1); margin-bottom: 40px; text-align: left; }
        footer { padding: 80px 0 40px; border-top: 1px solid rgba(255, 255, 255, 0.05); color: #4b5563; font-size: 0.85rem; }
        footer a { color: inherit; text-decoration: none; margin: 0 15px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-wrap"><img src="https://raw.githubusercontent.com/onebender137/hopes-and-dreams-site/main/TOPPER.jpg" alt="Hopes and Dreams"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Procurement</a>
            <a href="intel.html" style="color: var(--neon-gold)">Intel Hub</a>
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
        </nav>
    </header>
    <div class="container">
        <div class="glow-divider"></div>
        <h1 class="page-title">Intel Hub</h1>
        <div class="intel-card">
            <h2>Connection Established</h2>
            <p>Decentralized intelligence archives loading...</p>
        </div>
        <footer>
            <p>&copy; 2026 Hopes and Dreams. All Rights Reserved.</p>
            <p><a href="privacy.html">Privacy Policy</a> | <a href="about.html">Contact Us</a></p>
        </footer>
    </div>
</body>
</html>
