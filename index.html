<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopes and Dreams | Turning Ambition into Action</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Exact color match to your logo background */
            --bg-deep: #060813; 
            --card-bg: #0d1226;
            --neon-blue: #38bdf8;
            --neon-gold: #ff9900;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 1. SEAMLESS LOGO HEADER */
        header {
            text-align: center;
            padding: 40px 20px 20px;
            background: linear-gradient(180deg, #0a0e24 0%, var(--bg-deep) 100%);
        }

        .logo-wrap {
            max-width: 600px;
            margin: 0 auto;
        }

        .logo-wrap img {
            width: 100%;
            height: auto;
            /* This filter helps blend the image edges if there's a slight color mismatch */
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.2));
        }

        /* 2. GLOWING NAVIGATION */
        nav {
            margin-top: 10px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            padding-bottom: 20px;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        /* 3. HERO CONTENT */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero-text {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero-text h2 {
            font-size: 1.2rem;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 700px;
            margin: 0 auto;
        }

        /* 4. FEATURE CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, border 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.4);
        }

        .card h3 {
            margin-top: 0;
            color: var(--neon-blue);
            font-size: 1.4rem;
        }

        /* 5. AMAZON BOX */
        .amazon-bar {
            margin-top: 60px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 153, 0, 0.05);
            border: 1px dashed var(--neon-gold);
            text-align: center;
            font-size: 0.8rem;
            color: var(--neon-gold);
        }

        footer {
            margin-top: 80px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #475569;
        }

        @media (max-width: 600px) {
            .logo-wrap { max-width: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrap">
            <img src="https://github.com/onebender137/hopes-and-dreams-site/blob/main/hopes-and-dreams-pro-logo.png?raw=true">
        </div>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero-text">
            <h2>Turning Ambition into Action</h2>
            <p>Based in Saint John, NB, we identify the life hacks and tech stacks that help modern builders bridge the gap between reality and their ultimate goals.</p>
        </section>

        <div class="grid">
