<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy & Disclosures | Hopes and Dreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #03091f; 
            --card-bg: #0d162d; 
            --neon-blue: #38bdf8;
            --neon-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER & NAV (Matches Index Exactly) --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 0 20px 0;
            background-color: var(--bg-main);
        }

        .logo-wrap {
            width: 95%;
            max-width: 700px;
            position: relative;
            line-height: 0;
        }

        .logo-wrap img {
            width: 100%;
            height: auto;
            display: block;
            filter: contrast(1.15) brightness(0.95) saturate(1.1);
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 45%, rgba(0,0,0,0) 95%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 45%, rgba(0,0,0,0) 95%);
        }

        nav {
            margin-top: 40px; 
            padding-bottom: 60px;
            z-index: 10;
            position: relative;
            display: flex;
            gap: 40px;
        }

        nav a {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 1.3rem; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }
